<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>これいる聖遺物 - うーこの部屋</title>

  <!-- Favicon -->
  <link rel="icon" href="https://cdn.jsdelivr.net/gh/uko05/99_SharedImage@main/00_common/favicon_io/favicon.ico" type="image/x-icon">
  <link rel="icon" sizes="16x16" href="https://cdn.jsdelivr.net/gh/uko05/99_SharedImage@main/00_common/favicon_io/favicon-16x16.png">
  <link rel="icon" sizes="32x32" href="https://cdn.jsdelivr.net/gh/uko05/99_SharedImage@main/00_common/favicon_io/favicon-32x32.png">

  <!-- Apple Touch Icon (for iOS) -->
  <link rel="apple-touch-icon" href="https://cdn.jsdelivr.net/gh/uko05/99_SharedImage@main/00_common/favicon_io/apple-touch-icon.png">

  <!-- Android Icons (for Android devices) -->
  <link rel="icon" sizes="192x192" href="https://cdn.jsdelivr.net/gh/uko05/99_SharedImage@main/00_common/favicon_io/android-chrome-192x192.png">
  <link rel="icon" sizes="512x512" href="https://cdn.jsdelivr.net/gh/uko05/99_SharedImage@main/00_common/favicon_io/android-chrome-512x512.png">
  <style>
    @font-face {
      font-family: 'MihoyoZenZero';
      src: url('font/mihoyo-zenzero.ttf') format('truetype');
    }

    :root {
      --bg:       #f4f4f9;
      --surface:  #ffffff;
      --surface2: #eeeeee;
      --accent:   #ffcc00;
      --text:     #333333;
      --muted:    #888888;
      --border:   #dddddd;
      --font:     'MihoyoZenZero', 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      --max-w:    680px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 200px;
    }

    /* サイドバーCSS → sidebar.js に移管 */

    /* ========== ヘッダー ========== */
    header {
      background: var(--surface);
      border-bottom: 2px solid var(--accent);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    /* ①タイトル中央寄せ：左右均等パディングで真ん中に */
    .header-top {
      min-height: 56px; /* ②ハンバーガー(40px+top8px)が収まる高さ確保 */
      padding: 8px 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .header-top h1 {
      font-size: 1rem;
      font-weight: bold;
      color: var(--text);
      letter-spacing: 0.05em;
    }

    /* 聖遺物スクロール */
    .artifact-scroll-outer {
      overflow: hidden;
      border-top: 1px solid var(--border);
      position: relative;
    }
    /* 案A：1周の区切り線（太め赤線） */
    .scroll-divider {
      flex-shrink: 0;
      width: 6px;
      height: 60px;
      align-self: center;
      margin: 0 10px;
      background: #e05a2b;
      border-radius: 2px;
    }
    /* 案C：現在位置インジケーター */
    .scroll-indicator {
      position: absolute;
      top: 5px;
      right: 8px;
      background: rgba(0,0,0,0.42);
      color: #fff;
      font-size: 0.68rem;
      font-weight: bold;
      padding: 2px 7px;
      border-radius: 10px;
      pointer-events: none;
      z-index: 3;
      letter-spacing: 0.04em;
    }

    .artifact-scroll-wrap {
      overflow-x: auto;
      display: flex;
      gap: 6px;
      padding: 6px 10px;
      scroll-behavior: auto;
      scrollbar-width: none;
      cursor: grab;
    }
    .artifact-scroll-wrap:active { cursor: grabbing; }
    .artifact-scroll-wrap::-webkit-scrollbar { display: none; }

    .artifact-btn {
      flex-shrink: 0;
      background: none;
      border: 2px solid transparent;
      border-radius: 8px;
      cursor: pointer;
      padding: 3px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      transition: border-color 0.15s, background 0.15s;
    }
    .artifact-btn:hover { border-color: rgba(255,204,0,0.5); }
    .artifact-btn.active {
      border-color: var(--accent);
      background: rgba(255,204,0,0.1);
    }
    .artifact-btn img {
      width: 44px;
      height: 44px;
      object-fit: contain;
      background: var(--surface2);
      border-radius: 6px;
    }
    .artifact-btn span {
      font-size: 0.58rem;
      color: var(--muted);
      white-space: nowrap;
      max-width: 52px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .artifact-btn.active span { color: #aa8800; font-weight: bold; }

    /* 妥協チェックボックスバー */
    .alt-check-bar {
      border-top: 1px solid var(--border);
      padding: 5px 12px;
      background: var(--surface);
      text-align: center;
    }

    .alt-check-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
    }

    .alt-check-label input[type="checkbox"] {
      width: 14px;
      height: 14px;
      cursor: pointer;
      accent-color: var(--accent);
    }

    /* ④聖遺物詳細パネル */
    .artifact-detail-bar {
      border-top: 1px solid var(--border);
      background: #fafafa;
    }

    .artifact-detail-inner {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 8px 12px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .detail-icon-col {
      flex-shrink: 0;
      text-align: center;
      width: 56px;
    }

    .detail-icon-col img {
      width: 46px;
      height: 46px;
      border-radius: 6px;
      background: var(--surface2);
      object-fit: contain;
    }

    .detail-set-name {
      font-size: 0.6rem;
      font-weight: bold;
      color: var(--text);
      margin-top: 3px;
      line-height: 1.3;
      word-break: break-all;
    }

    .detail-effects-col {
      flex: 1;
      overflow-y: auto;
      max-height: 84px;
      font-size: 0.76rem;
      line-height: 1.55;
      color: var(--text);
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .detail-effects-col::-webkit-scrollbar { width: 4px; }
    .detail-effects-col::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .detail-effect-row { margin-bottom: 5px; }

    .detail-effect-badge {
      display: inline-block;
      background: var(--accent);
      color: #333;
      font-size: 0.62rem;
      font-weight: bold;
      padding: 1px 5px;
      border-radius: 3px;
      margin-right: 5px;
      white-space: nowrap;
    }

    /* ========== 部位タブ ========== */
    .tab-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0; /* JSで上書き */
      z-index: 99;
    }

    .tab-bar-inner {
      max-width: var(--max-w);
      margin: 0 auto;
      display: flex;
    }

    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      padding: 11px 8px;
      font-family: var(--font);
      font-size: 0.9rem;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      text-align: center;
      margin-bottom: -1px;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--text); border-bottom-color: var(--accent); font-weight: bold; }

    /* ========== 中央コンテンツ ========== */
    main {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 16px;
    }

    .stat-group { margin-bottom: 20px; }

    .stat-title {
      font-size: 0.88rem;
      color: var(--text);
      font-weight: bold;
      margin-bottom: 10px;
      padding: 3px 8px 5px;
      background: #fff8cc;
      border-radius: 4px;
      border-bottom: 1px solid var(--border);
    }

    .char-icons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding-left: 4px;
    }

    /* キャラアイコン：正方形 */
    .char-icon-btn {
      background: none;
      border: 2px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      padding: 0;
      overflow: hidden;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .char-icon-btn:hover { border-color: var(--accent); }
    @keyframes pulse-border {
      0%, 100% { box-shadow: 0 0 4px 1px rgba(220,53,69,0.45); border-color: #dc3545; }
      50%       { box-shadow: 0 0 14px 6px rgba(220,53,69,0.3); border-color: #ff6b7a; }
    }
    .char-icon-btn.active {
      border-color: #dc3545;
      box-shadow: 0 0 4px 1px rgba(220,53,69,0.45);
      animation: pulse-border 1.6s ease-in-out infinite;
    }
    .char-icon-btn img {
      width: 56px;
      height: 56px;
      display: block;
      background: var(--surface2);
      object-fit: cover;
    }

    /* 妥協バッジ */
    .char-icon-wrap {
      position: relative;
    }

    .char-badge {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(74, 144, 226, 0.85);
      color: #fff;
      font-size: 0.58rem;
      text-align: center;
      padding: 1px 0;
      line-height: 1.5;
      pointer-events: none;
    }

    /* セット数バッジ（右上） */
    .set-type-badge {
      position: absolute;
      top: 2px;
      right: 2px;
      font-size: 0.68rem;
      font-weight: bold;
      padding: 1px 4px;
      border-radius: 3px;
      line-height: 1.4;
      pointer-events: none;
    }
    .set-type-badge.badge-second { top: 20px; }
    .set-type-badge.badge-4 {
      background: rgba(255, 204, 0, 0.9);
      color: #554400;
    }
    .set-type-badge.badge-22 {
      background: rgba(76, 175, 80, 0.88);
      color: #fff;
    }

    .no-result {
      font-size: 0.85rem;
      color: var(--muted);
      padding: 20px 4px;
    }

    /* ========== フッター固定カード ========== */
    #detail-card {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 2px solid var(--accent);
      z-index: 200;
      max-height: 190px;
      overflow-y: auto;
    }

    .card-inner {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 10px 16px;
    }

    .card-placeholder {
      text-align: center;
      color: var(--muted);
      padding: 12px 0;
      font-size: 0.82rem;
    }

    .card-content {
      display: grid;
      grid-template-columns: auto 1fr;
      column-gap: 12px;
      row-gap: 6px;
      align-items: start;
    }

    /* 画像の真下からフルワイドで表示する行 */
    .card-bottom {
      grid-column: 1 / -1;
      display: flex;
      flex-wrap: wrap;
      gap: 2px 12px;
      font-size: 0.78rem;
      line-height: 1.5;
    }

    .card-chara { flex-shrink: 0; }

    .card-chara img {
      width: 60px;
      height: 60px;
      border-radius: 8px;
      border: 2px solid var(--accent);
      background: var(--surface2);
      display: block;
      object-fit: cover;
    }

    /* 名前は右カラム（card-info）の先頭に置く */
    .card-chara-name {
      font-size: 0.82rem;
      font-weight: bold;
      color: var(--text);
      line-height: 1.3;
    }

    .card-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 0.8rem;
      min-width: 0;
    }

    .card-row {
      display: flex;
      flex-wrap: wrap;
      gap: 2px 12px;
      line-height: 1.5;
    }

    .card-lbl { color: var(--muted); white-space: nowrap; }
    .card-val { color: var(--text); font-weight: bold; }
    .card-val-muted { color: var(--muted); font-weight: normal; font-style: italic; }

    /* ハイライト：選択中セット行・部位 → 値のみ赤文字 */
    .card-row.highlight .card-val { color: #e53935; }

    .part-item { display: inline-flex; gap: 0; font-size: 1.05em; }

    .part-item.highlight .card-val { color: #e53935; }

    /* グループリンク */
    .group-link {
      text-decoration: underline;
      cursor: pointer;
    }
    .group-link:hover { opacity: 0.72; }

    /* グループポップアップ */
    .group-popup {
      position: fixed;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      padding: 10px 14px;
      z-index: 500;
      min-width: 160px;
      max-width: 280px;
      font-size: 0.82rem;
    }
    .group-popup-title {
      font-weight: bold;
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .group-popup-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      border-bottom: 1px solid var(--border);
      line-height: 1.4;
    }
    .group-popup-item:last-child { border-bottom: none; }
    .group-popup-item { cursor: pointer; }
    .group-popup-item:hover { background: rgba(0,0,0,0.04); border-radius: 4px; }
    .group-popup-item img {
      width: 28px;
      height: 28px;
      border-radius: 4px;
      background: var(--surface2);
      object-fit: contain;
      flex-shrink: 0;
    }
    .group-popup-item span { text-decoration: underline; }

    .card-sub {
      color: var(--muted);
      font-size: 0.76rem;
      line-height: 1.4;
    }

    /* ========== ③ PC：画像を約2倍 ========== */
    @media (min-width: 640px) {
      .artifact-btn img {
        width: 80px;
        height: 80px;
      }
      .artifact-btn span {
        font-size: 0.62rem;
        max-width: 88px;
      }
      .char-icon-btn img {
        width: 88px;
        height: 88px;
      }
      .detail-icon-col img {
        width: 72px;
        height: 72px;
      }
      .detail-icon-col {
        width: 84px;
      }
      .detail-effects-col {
        max-height: 100px;
        font-size: 0.82rem;
      }
    }

    /* ========== メインモードタブ（聖遺物 / キャラ） ========== */
    .main-mode-tab-bar {
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
    }
    .main-mode-tab-btn {
      flex: 1;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      padding: 9px 8px;
      font-family: var(--font);
      font-size: 0.88rem;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      text-align: center;
      margin-bottom: -1px;
    }
    .main-mode-tab-btn:hover { color: var(--text); }
    .main-mode-tab-btn.active { color: var(--text); border-bottom-color: var(--accent); background: rgba(255, 204, 0, 0.18); font-weight: bold; }

    /* ========== キャラ元素タブ（04_Mirishira形式・2段） ========== */
    .char-tab-wrap {
      display: flex;
      flex-wrap: wrap;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }
    .char-tab-switch { display: none; }
    .char-tab-label {
      flex: 0 0 25%; /* 4列 × 2段 */
      box-sizing: border-box;
      text-align: center;
      padding: 6px 2px;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.72rem;
      font-family: var(--font);
      background: var(--surface2);
      color: var(--muted);
      order: -1;
      border-bottom: 2px solid transparent;
      transition: background 0.15s, color 0.15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
    }
    .char-tab-label img {
      width: 26px;
      height: 26px;
      object-fit: contain;
      display: block;
    }
    .char-tab-label:hover { opacity: 0.85; }
    .char-tab-content {
      width: 100%;
      height: 0;
      overflow: hidden;
      opacity: 0;
      order: 99;
    }
    .char-tab-switch:checked + .char-tab-label { color: #fff; border-bottom-color: rgba(255,255,255,0.4); }
    .char-tab-switch:checked + .char-tab-label + .char-tab-content {
      height: auto;
      overflow: visible;
      opacity: 1;
    }
    /* 元素ごとのアクティブ色 */
    #ctab-all:checked     + .char-tab-label { background: #666; }
    #ctab-pyro:checked    + .char-tab-label { background: #e05a2b; }
    #ctab-hydro:checked   + .char-tab-label { background: #2b6be0; }
    #ctab-cryo:checked    + .char-tab-label { background: #42a5c8; }
    #ctab-electro:checked + .char-tab-label { background: #9b59b6; }
    #ctab-dendro:checked  + .char-tab-label { background: #3a9b47; }
    #ctab-anemo:checked   + .char-tab-label { background: #2aaba8; }
    #ctab-geo:checked     + .char-tab-label { background: #c8963e; }
    /* 案A：キャラタブの区切り線を元素色に合わせる */
    #ctab-all:checked     + .char-tab-label + .char-tab-content .scroll-divider { background: #666; }
    #ctab-pyro:checked    + .char-tab-label + .char-tab-content .scroll-divider { background: #e05a2b; }
    #ctab-hydro:checked   + .char-tab-label + .char-tab-content .scroll-divider { background: #2b6be0; }
    #ctab-cryo:checked    + .char-tab-label + .char-tab-content .scroll-divider { background: #42a5c8; }
    #ctab-electro:checked + .char-tab-label + .char-tab-content .scroll-divider { background: #9b59b6; }
    #ctab-dendro:checked  + .char-tab-label + .char-tab-content .scroll-divider { background: #3a9b47; }
    #ctab-anemo:checked   + .char-tab-label + .char-tab-content .scroll-divider { background: #2aaba8; }
    #ctab-geo:checked     + .char-tab-label + .char-tab-content .scroll-divider { background: #c8963e; }

    /* ========== キャラ詳細（キャラタブ・メインエリア） ========== */
    .chara-detail-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }
    .chara-detail-top {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .chara-detail-img {
      width: 100px;
      height: 100px;
      border-radius: 8px;
      object-fit: cover;
      border: 2px solid var(--accent);
      flex-shrink: 0;
      background: var(--surface2);
    }
    .chara-detail-charname {
      font-size: 1.3rem;
      font-weight: bold;
      color: var(--text);
      line-height: 1.3;
    }
    .chara-detail-body {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .chara-detail-row {
      font-size: 0.95rem;
      line-height: 1.5;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .chara-detail-row .card-lbl {
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
      align-self: flex-start;
      padding-top: 2px;
    }
    .chara-detail-row .card-val {
      color: var(--text);
      font-weight: bold;
    }
    .chara-detail-row .card-val-muted {
      color: var(--muted);
      font-weight: normal;
      font-style: italic;
    }
    .chara-detail-sublbl {
      font-size: 0.95rem;
      color: var(--muted);
    }
    .chara-detail-subval {
      font-size: 0.95rem;
      font-weight: bold;
      color: var(--text);
      padding-left: 4px;
    }
    @media (min-width: 640px) {
      .chara-detail-img { width: 130px; height: 130px; }
      .chara-detail-charname { font-size: 1.5rem; }
      .chara-detail-row, .chara-detail-sublbl, .chara-detail-subval { font-size: 1.05rem; }
    }
    /* 聖遺物アイコン（キャラ詳細内） */
    .chara-set-entry {
      display: inline-flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
      cursor: pointer;
    }
    .chara-set-name {
      text-decoration: underline;
    }
    .chara-set-icons {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .chara-set-icon {
      width: 64px;
      height: 64px;
      border-radius: 6px;
      flex-shrink: 0;
      cursor: pointer;
    }
    /* キャラタブ：フッター聖遺物情報 */
    .chara-footer-artifact {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .chara-footer-art-col {
      flex-shrink: 0;
      text-align: center;
      width: 70px;
    }
    .chara-footer-art-col {
      width: 90px;
    }
    .chara-footer-art-col .chara-set-icon-wrap {
      cursor: pointer;
      overflow: visible;
    }
    .chara-footer-art-col .chara-set-icon-wrap:hover img { opacity: 0.85; }
    .chara-footer-art-col .chara-set-icon-badge {
      bottom: -6px;
      background: rgba(255, 204, 0, 0.65);
      color: #333;
      border-radius: 0 0 6px 6px;
    }

  <!-- 中央コンテンツ -->

  <!-- フッター固定カード -->
  <div id="detail-card">
    <div class="card-inner">
      <div class="card-placeholder">キャラアイコンをクリックすると詳細が表示されます</div>
    </div>
  </div>

  <script type="module">
    import { MAIN_STATS, STAT_LABEL, ALLOWED_MAIN_STATS } from './stats.js';
    import { characterBuild } from './characterBuild.js';

    const [artifactSets, effect2Groups] = await Promise.all([
      fetch('./artifact_sets.json').then(r => r.json()),
      fetch('./effect2_groups.json').then(r => r.json()),
    ]);

    const LS_KEY     = 'artifactcheck_selected_set';
    const LS_ALT_KEY = 'artifactcheck_show_alt';

    let selectedSetId = localStorage.getItem(LS_KEY) ?? artifactSets[0].id;
    let selectedPart  = 'sands';
    let selectedChar  = null;
    let showAlt       = localStorage.getItem(LS_ALT_KEY) !== 'false'; // デフォルトtrue

    // sets[] が selectedSetId にマッチするか判定
    // - 直接IDマッチ
    // - sets[].id がグループIDで、selectedSetId がそのグループの setIds に含まれる場合もマッチ
    function setsMatchSelected(sets) {
      return sets.some(s => {
        if (s.id === selectedSetId) return true;
        const group = effect2Groups.find(g => g.id === s.id);
        return group ? group.setIds.includes(selectedSetId) : false;
      });
    }

    function getDisplayStat(stat) {
      if (stat === MAIN_STATS.CRIT) return '会心率 / 会心ダメ';
      return STAT_LABEL[stat] ?? stat;
    }

    // ========== tab-bar sticky top を header 高さに追従 ==========
    const headerEl = document.getElementById('main-header');
    const tabBarEl = document.getElementById('tab-bar');

    function updateTabTop() {
      tabBarEl.style.top = headerEl.offsetHeight + 'px';
    }

    new ResizeObserver(updateTabTop).observe(headerEl);

    // ========== ④ 聖遺物詳細パネル ==========
    function renderArtifactDetail() {
      const panel = document.getElementById('artifact-detail');
      const set = artifactSets.find(s => s.id === selectedSetId);
      if (!set) { panel.innerHTML = ''; return; }

      const effect2Html = set.effect2
        ? `<div class="detail-effect-row">
             <span class="detail-effect-badge">2セット</span>${set.effect2}
           </div>`
        : '';
      const effect4Html = set.effect4
        ? `<div class="detail-effect-row">
             <span class="detail-effect-badge">4セット</span>${set.effect4}
           </div>`
        : '';

      panel.innerHTML = `
        <div class="detail-icon-col">
          <img src="https://cdn.jsdelivr.net/gh/uko05/99_SharedImage@main/01_Genshin/artifact/${set.id}.png" alt="${set.name}" onerror="this.style.opacity='0.3'">
          <div class="detail-set-name">${set.name}</div>
        </div>
        <div class="detail-effects-col">
          ${effect2Html}${effect4Html}
        </div>
      `;
    }

    // ========== 聖遺物スクロール（無限ループカルーセル） ==========
    const COPIES = 3;
    let singleWidth = 0;
    const scrollEl = document.getElementById('artifact-scroll');

    function makeArtifactBtn(set) {
      const btn = document.createElement('button');
      btn.className = 'artifact-btn' + (set.id === selectedSetId ? ' active' : '');
      btn.dataset.setId = set.id;
      btn.title = set.name;

      const img = document.createElement('img');
      img.src = `https://cdn.jsdelivr.net/gh/uko05/99_SharedImage@main/01_Genshin/artifact/${set.id}.png`;
      img.alt = set.name;
      img.draggable = false; // ブラウザのimg drag-and-dropを無効化
      img.onerror = () => { img.style.opacity = '0.3'; };

      const label = document.createElement('span');
      label.textContent = set.name;

      btn.appendChild(img);
      btn.appendChild(label);

      btn.addEventListener('click', () => {
        selectedSetId = set.id;
        localStorage.setItem(LS_KEY, selectedSetId);
        scrollEl.querySelectorAll('.artifact-btn').forEach(b => {
          b.classList.toggle('active', b.dataset.setId === selectedSetId);
        });
        renderArtifactDetail();
        renderMain();
      });

      return btn;
    }

    function makeScrollDivider() {
      const d = document.createElement('div');
      d.className = 'scroll-divider';
      return d;
    }

    let artifactIndicator = null;
    let artifactRafPending = false;

    function renderArtifactScroll() {
      scrollEl.innerHTML = '';
      const n = artifactSets.length;
      for (let c = 0; c < COPIES; c++) {
        scrollEl.appendChild(makeScrollDivider());
        for (const set of artifactSets) {
          scrollEl.appendChild(makeArtifactBtn(set));
        }
      }
      // インジケーター生成
      const outer = scrollEl.parentElement;
      outer.querySelector('.scroll-indicator')?.remove();
      artifactIndicator = document.createElement('div');
      artifactIndicator.className = 'scroll-indicator';
      artifactIndicator.textContent = `1 / ${n}`;
      outer.appendChild(artifactIndicator);

      requestAnimationFrame(() => {
        singleWidth = scrollEl.scrollWidth / COPIES;
        const selIdx = artifactSets.findIndex(s => s.id === selectedSetId);
        const allBtns = scrollEl.querySelectorAll('.artifact-btn');
        const targetBtn = allBtns[artifactSets.length + selIdx];
        if (targetBtn) {
          // getBoundingClientRect で offsetParent に依存しない正確な位置計算
          const scrollRect = scrollEl.getBoundingClientRect();
          const btnRect = targetBtn.getBoundingClientRect();
          const relLeft = btnRect.left - scrollRect.left + scrollEl.scrollLeft;
          const offset = relLeft - (scrollEl.clientWidth - targetBtn.offsetWidth) / 2;
          scrollEl.scrollLeft = Math.max(singleWidth * 0.1, offset);
        } else {
          scrollEl.scrollLeft = singleWidth;
        }
      });
    }

    // 無限ループ：端に近づいたら中コピーへジャンプ
    scrollEl.addEventListener('scroll', () => {
      if (!singleWidth) return;
      if (scrollEl.scrollLeft < singleWidth * 0.3) {
        scrollEl.scrollLeft += singleWidth;
      } else if (scrollEl.scrollLeft > singleWidth * 1.7) {
        scrollEl.scrollLeft -= singleWidth;
      }
      // 案C：インジケーター更新（rAFでスロットル）
      if (!artifactRafPending) {
        artifactRafPending = true;
        requestAnimationFrame(() => {
          artifactRafPending = false;
          if (!artifactIndicator) return;
          const n = artifactSets.length;
          const cx = scrollEl.getBoundingClientRect().left + scrollEl.clientWidth / 2;
          const btns = scrollEl.querySelectorAll('.artifact-btn');
          let best = 0, minDist = Infinity;
          for (let i = 0; i < btns.length; i++) {
            const r = btns[i].getBoundingClientRect();
            const dist = Math.abs(r.left + r.width / 2 - cx);
            if (dist < minDist) { minDist = dist; best = i % n; }
          }
          artifactIndicator.textContent = `${best + 1} / ${n}`;
        });
      }
    }, { passive: true });

    // ③ PC：マウスホイールを横スクロールに変換（deltaMode対応）
    scrollEl.addEventListener('wheel', (e) => {
      e.preventDefault();
      let delta = e.deltaY !== 0 ? e.deltaY : e.deltaX;
      if (e.deltaMode === 1) delta *= 40;       // LINE モード
      if (e.deltaMode === 2) delta *= scrollEl.clientWidth; // PAGE モード
      scrollEl.scrollLeft += delta;
    }, { passive: false });

    // ③ PC：ドラッグスクロール
    let isDragging = false;
    let dragStartX = 0;
    let dragScrollLeft = 0;

    scrollEl.addEventListener('mousedown', (e) => {
      e.preventDefault(); // imgのネイティブdrag-and-dropを抑止
      isDragging = true;
      dragStartX = e.clientX;
      dragScrollLeft = scrollEl.scrollLeft;
      scrollEl.style.userSelect = 'none';
    });

    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      const dx = e.clientX - dragStartX;
      scrollEl.scrollLeft = dragScrollLeft - dx;
    });

    document.addEventListener('mouseup', () => {
      isDragging = false;
      scrollEl.style.userSelect = '';
    });

    // ========== 中央コンテンツ描画 ==========
    function renderMain() {
      const allowedStats = ALLOWED_MAIN_STATS[selectedPart] ?? [];
      const main = document.getElementById('main-content');
      main.innerHTML = '';

      let anyRendered = false;

      for (const stat of allowedStats) {
        const matchingChars = Object.entries(characterBuild)
          .map(([name, data]) => {
            if (data.mainStats[selectedPart] !== stat) return null;
            const rank1 = data.recommendedSets.find(s => s.rank === 1);
            const rank2 = data.recommendedSets.find(s => s.rank === 2);
            const inRank1 = rank1 && setsMatchSelected(rank1.sets);
            const inRank2 = showAlt && rank2 && setsMatchSelected(rank2.sets);
            if (!inRank1 && !inRank2) return null;
            return { name, isAlt: !inRank1 && !!rank2, alsoRank2: !!inRank1 && !!inRank2 };
          })
          .filter(Boolean);

        if (matchingChars.length === 0) continue;

        anyRendered = true;

        const group = document.createElement('div');
        group.className = 'stat-group';
        group.innerHTML = `<div class="stat-title">${getDisplayStat(stat)}</div>`;

        const iconRow = document.createElement('div');
        iconRow.className = 'char-icons';
        matchingChars.forEach(({ name, isAlt, alsoRank2 }) => iconRow.appendChild(makeCharIconBtn(name, isAlt, alsoRank2)));

        group.appendChild(iconRow);
        main.appendChild(group);
      }

      if (!anyRendered) {
        main.innerHTML = '<p class="no-result">この聖遺物・部位の組み合わせに対応するキャラがいません</p>';
      }
    }

    // ========== キャラアイコンボタン ==========
    function makeCharIconBtn(charName, isAlt = false, alsoRank2 = false) {
      const data = characterBuild[charName];
      const btn = document.createElement('button');
      btn.className = 'char-icon-btn' + (selectedChar === charName ? ' active' : '');
      btn.title = charName + (isAlt ? '（妥協）' : '');

      const wrap = document.createElement('div');
      wrap.className = 'char-icon-wrap';

      const img = document.createElement('img');
      img.src = `https://cdn.jsdelivr.net/gh/uko05/99_SharedImage@main/01_Genshin/chara_full/${data.icon}`;
      img.alt = charName;
      img.onerror = () => { img.style.opacity = '0.3'; };
      wrap.appendChild(img);

      // セット数バッジ（右上）
      function makeBadge(sets, isSecond = false) {
        const is4set = sets.length === 1 && sets[0].count === 4;
        const badge = document.createElement('div');
        badge.className = 'set-type-badge ' + (is4set ? 'badge-4' : 'badge-22') + (isSecond ? ' badge-second' : '');
        badge.textContent = is4set ? '4' : '2+2';
        return badge;
      }
      const rank1Data = data.recommendedSets.find(s => s.rank === 1);
      const rank2Data = data.recommendedSets.find(s => s.rank === 2);
      if (!isAlt && rank1Data) {
        wrap.appendChild(makeBadge(rank1Data.sets));
        if (alsoRank2 && rank2Data) wrap.appendChild(makeBadge(rank2Data.sets, true));
      } else if (isAlt && rank2Data) {
        wrap.appendChild(makeBadge(rank2Data.sets));
      }

      if (isAlt) {
        const badge = document.createElement('div');
        badge.className = 'char-badge';
        badge.textContent = '妥協';
        wrap.appendChild(badge);
      }

      btn.appendChild(wrap);
      btn.addEventListener('click', () => {
        document.querySelectorAll('.char-icon-btn.active').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedChar = charName;
        renderCard();
      });
      return btn;
    }

    // ========== フッターカード描画 ==========
    function renderCard() {
      const inner = document.querySelector('#detail-card .card-inner');

      if (!selectedChar) {
        inner.innerHTML = '<div class="card-placeholder">キャラアイコンをクリックすると詳細が表示されます</div>';
        return;
      }

      const data = characterBuild[selectedChar];
      const rank1Set = data.recommendedSets.find(s => s.rank === 1);
      const rank2Set = data.recommendedSets.find(s => s.rank === 2);

      function setLabel(recSet) {
        return recSet.sets.map(s => {
          const master = artifactSets.find(m => m.id === s.id);
          if (master) return `${master.name}(${s.count}セット)`;
          const group = effect2Groups.find(g => g.id === s.id);
          if (group) return `<span class="group-link" data-group-id="${s.id}">${group.name}</span>(${s.count}セット)`;
          return `${s.id}(${s.count}セット)`;
        }).join(' + ');
      }

      const rank1Hl = rank1Set && setsMatchSelected(rank1Set.sets) ? ' highlight' : '';
      const rank2Hl = rank2Set && setsMatchSelected(rank2Set.sets) ? ' highlight' : '';

      const rank2Row = rank2Set
        ? `<div class="card-row${rank2Hl}"><span class="card-lbl">妥協：</span><span class="card-val">${setLabel(rank2Set)}</span></div>`
        : `<div class="card-row"><span class="card-lbl">妥協：</span><span class="card-val card-val-muted">使用率10％未満のため記載なし</span></div>`;

      const partMap = [
        { key: 'sands',   label: '時計' },
        { key: 'goblet',  label: '杯' },
        { key: 'circlet', label: '冠' },
      ];
      const mainStatItems = partMap
        .map(({ key, label }) => {
          const hl = key === selectedPart ? ' highlight' : '';
          return `<span class="part-item${hl}"><span class="card-lbl">${label}：</span><span class="card-val">${getDisplayStat(data.mainStats[key])}</span></span>`;
        }).join('');

      const subStatText = data.subStats.map(s => getDisplayStat(s)).join('・');

      inner.innerHTML = `
        <div class="card-content">
          <div class="card-chara">
            <img src="https://cdn.jsdelivr.net/gh/uko05/99_SharedImage@main/01_Genshin/chara_full/${data.icon}" alt="${selectedChar}" onerror="this.style.opacity='0.3'">
          </div>
          <div class="card-info">
            <div class="card-chara-name">${selectedChar}</div>
            <div class="card-row${rank1Hl}"><span class="card-lbl">最適：</span><span class="card-val">${setLabel(rank1Set)}</span></div>
            ${rank2Row}
          </div>
          <div class="card-bottom">
            ${mainStatItems}
            <span style="width:100%;"></span>
            <span class="card-lbl">推奨サブステ：</span><span style="color:var(--text)">${subStatText}</span>
          </div>
        </div>
      `;
      attachGroupLinkHandlers(inner);
    }

    // ========== グループリンク ポップアップ ==========
    let groupPopupEl = null;

    function attachGroupLinkHandlers(container) {
      container.querySelectorAll('.group-link').forEach(el => {
        el.addEventListener('click', (e) => {
          e.stopPropagation();
          showGroupPopup(el.dataset.groupId, el);
        });
      });
    }

    function showGroupPopup(groupId, anchorEl) {
      closeGroupPopup();
      const group = effect2Groups.find(g => g.id === groupId);
      if (!group) return;

      const popup = document.createElement('div');
      popup.className = 'group-popup';

      const title = document.createElement('div');
      title.className = 'group-popup-title';
      title.textContent = group.name + ' の聖遺物一覧';
      popup.appendChild(title);

      group.setIds.forEach(setId => {
        const set = artifactSets.find(s => s.id === setId);
        if (!set) return;
        const item = document.createElement('div');
        item.className = 'group-popup-item';
        item.innerHTML = `<img src="https://cdn.jsdelivr.net/gh/uko05/99_SharedImage@main/01_Genshin/artifact/${set.id}.png" alt="${set.name}" onerror="this.style.opacity='0.3'"><span>${set.name}</span>`;
        item.addEventListener('click', (e) => {
          e.stopPropagation();
          selectedSetId = set.id;
          localStorage.setItem(LS_KEY, selectedSetId);
          closeGroupPopup();
          if (activeMode === 'chara') {
            // キャラタブから: 選択キャラを引き継いで聖遺物タブへ切り替え
            selectedChar = selectedCharaMode;
            switchMode('artifact');
          } else {
            scrollEl.querySelectorAll('.artifact-btn').forEach(b => {
              b.classList.toggle('active', b.dataset.setId === selectedSetId);
            });
            renderArtifactDetail();
            renderMain();
            renderCard();
          }
        });
        popup.appendChild(item);
      });

      document.body.appendChild(popup);
      groupPopupEl = popup;

      // アンカー上に配置
      const rect = anchorEl.getBoundingClientRect();
      const popupH = popup.offsetHeight;
      const popupW = popup.offsetWidth;
      let top = rect.top - popupH - 8;
      let left = rect.left;
      if (top < 8) top = rect.bottom + 8;
      if (left + popupW > window.innerWidth) left = window.innerWidth - popupW - 10;
      if (left < 8) left = 8;
      popup.style.top = top + 'px';
      popup.style.left = left + 'px';
    }

    function closeGroupPopup() {
      if (groupPopupEl) { groupPopupEl.remove(); groupPopupEl = null; }
    }

    function showArtifactPopup(setId, anchorEl) {
      closeGroupPopup();
      const set = artifactSets.find(s => s.id === setId);
      if (!set) return;

      const popup = document.createElement('div');
      popup.className = 'group-popup artifact-popup';

      const title = document.createElement('div');
      title.className = 'group-popup-title';
      title.textContent = set.name;
      popup.appendChild(title);

      const effectsDiv = document.createElement('div');
      effectsDiv.className = 'artifact-popup-effects';
      if (set.effect2) effectsDiv.innerHTML += `<div class="detail-effect-row"><span class="detail-effect-badge">2セット</span>${set.effect2}</div>`;
      if (set.effect4) effectsDiv.innerHTML += `<div class="detail-effect-row"><span class="detail-effect-badge">4セット</span>${set.effect4}</div>`;
      popup.appendChild(effectsDiv);

      document.body.appendChild(popup);
      groupPopupEl = popup;

      const rect = anchorEl.getBoundingClientRect();
      const popupH = popup.offsetHeight;
      const popupW = popup.offsetWidth;
      let top = rect.top - popupH - 8;
      let left = rect.left;
      if (top < 8) top = rect.bottom + 8;
      if (left + popupW > window.innerWidth) left = window.innerWidth - popupW - 10;
      if (left < 8) left = 8;
      popup.style.top = top + 'px';
      popup.style.left = left + 'px';
    }

    function renderCharaFooterArtifact(setId, count) {
      const inner = document.querySelector('#detail-card .card-inner');
      const set = artifactSets.find(s => s.id === setId);
      if (!set) return;
      const isTwoPiece = Number(count) === 2;
      const effect2Style = isTwoPiece ? ' style="color:#e05a2b;font-weight:bold;"' : '';
      const effect2Html = set.effect2
        ? `<div class="detail-effect-row"><span class="detail-effect-badge">2セット</span><span${effect2Style}>${set.effect2}</span></div>`
        : '';
      const effect4Html = set.effect4
        ? `<div class="detail-effect-row"><span class="detail-effect-badge">4セット</span>${set.effect4}</div>`
        : '';
      inner.innerHTML = `
        <div class="chara-footer-artifact">
          <div class="chara-footer-art-col">
            <span class="chara-set-icon-wrap">
              <img class="chara-footer-art-img" src="https://cdn.jsdelivr.net/gh/uko05/99_SharedImage@main/01_Genshin/artifact/${set.id}.png" alt="${set.name}" onerror="this.style.opacity='0.3'">
              <span class="chara-set-icon-badge">タブで見る</span>
            </span>
            <div class="chara-footer-art-name">${set.name}</div>
          </div>
          <div class="chara-footer-effects">${effect2Html}${effect4Html}</div>
        </div>
      `;
      // 画像クリック → 聖遺物タブへ切り替え（選択キャラを引き継ぎ）
      inner.querySelector('.chara-set-icon-wrap').addEventListener('click', (e) => {
        e.stopPropagation();
        selectedSetId = setId;
        localStorage.setItem(LS_KEY, selectedSetId);
        selectedChar = selectedCharaMode;
        switchMode('artifact');
      });
    }

    function attachCharaSetHandlers(container) {
      // 通常セット（グループでない）のクリック → フッターに効果表示
      container.querySelectorAll('.chara-set-entry:not(.group-link)').forEach(el => {
        el.addEventListener('click', (e) => {
          e.stopPropagation();
          renderCharaFooterArtifact(el.dataset.setId, el.dataset.count);
        });
      });
      // グループ内の各聖遺物アイコンのクリック → フッターに効果表示
      container.querySelectorAll('.group-link .chara-set-icon').forEach(img => {
        img.addEventListener('click', (e) => {
          e.stopPropagation();
          renderCharaFooterArtifact(img.dataset.setId, img.dataset.count);
        });
      });
    }

    document.addEventListener('click', () => closeGroupPopup());

    // ========== イベント ==========

    // サイドバーのイベント処理 → sidebar.js に移管

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedPart = btn.dataset.part;
        renderMain();
        renderCard();
      });
    });

    const showAltEl = document.getElementById('show-alt');
    showAltEl.checked = showAlt;
    showAltEl.addEventListener('change', (e) => {
      showAlt = e.target.checked;
      localStorage.setItem(LS_ALT_KEY, showAlt);
      renderMain();
    });

    // ========== メインモード（聖遺物 / キャラ） ==========
    let activeMode = 'artifact';
    const artifactHeaderSection = document.getElementById('artifact-header-section');
    const charaHeaderSection    = document.getElementById('chara-header-section');
    const partTabBarEl          = document.getElementById('tab-bar');
    const detailCardEl          = document.getElementById('detail-card');

    function scrollToSelectedArtifact() {
      const selIdx = artifactSets.findIndex(s => s.id === selectedSetId);
      const allBtns = scrollEl.querySelectorAll('.artifact-btn');
      const targetBtn = allBtns[artifactSets.length + selIdx];
      if (targetBtn) {
        const offset = targetBtn.offsetLeft - (scrollEl.clientWidth / 2) + (targetBtn.offsetWidth / 2);
        scrollEl.scrollLeft = Math.max(singleWidth * 0.1, offset);
      }
    }

    function switchMode(mode) {
      activeMode = mode;
      document.querySelectorAll('.main-mode-tab-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.mode === mode);
      });
      if (mode === 'artifact') {
        artifactHeaderSection.style.display = '';
        charaHeaderSection.style.display    = 'none';
        partTabBarEl.style.display          = '';
        detailCardEl.style.display          = '';
        scrollEl.querySelectorAll('.artifact-btn').forEach(b => {
          b.classList.toggle('active', b.dataset.setId === selectedSetId);
        });
        renderArtifactDetail();
        renderMain();
        renderCard();
        scrollToSelectedArtifact();
      } else {
        artifactHeaderSection.style.display = 'none';
        charaHeaderSection.style.display    = '';
        partTabBarEl.style.display          = 'none';
        detailCardEl.style.display          = '';
        document.querySelector('#detail-card .card-inner').innerHTML =
          '<div class="card-placeholder">聖遺物名または画像をクリックすると効果が表示されます</div>';
        initAllCharScrolls();
        renderCharaMain();
      }
      updateTabTop();
    }

    document.querySelectorAll('.main-mode-tab-btn').forEach(btn => {
      btn.addEventListener('click', () => switchMode(btn.dataset.mode));
    });

    // ========== キャラタブ：元素別タブ ==========
    let selectedCharaMode = null;

    // ========== キャラスクロール初期化（元素タブごと） ==========
    const CHAR_TABS = [
      { id: 'cscroll-all',     chars: Object.keys(characterBuild) },
      { id: 'cscroll-pyro',    chars: Object.keys(characterBuild).filter(n => characterBuild[n].Element === '炎') },
      { id: 'cscroll-hydro',   chars: Object.keys(characterBuild).filter(n => characterBuild[n].Element === '水') },
      { id: 'cscroll-cryo',    chars: Object.keys(characterBuild).filter(n => characterBuild[n].Element === '氷') },
      { id: 'cscroll-electro', chars: Object.keys(characterBuild).filter(n => characterBuild[n].Element === '雷') },
      { id: 'cscroll-dendro',  chars: Object.keys(characterBuild).filter(n => characterBuild[n].Element === '草') },
      { id: 'cscroll-anemo',   chars: Object.keys(characterBuild).filter(n => characterBuild[n].Element === '風') },
      { id: 'cscroll-geo',     chars: Object.keys(characterBuild).filter(n => characterBuild[n].Element === '岩') },
    ];

    function makeCharScrollBtn(charName) {
      const data = characterBuild[charName];
      const btn  = document.createElement('button');
      btn.className      = 'artifact-btn' + (selectedCharaMode === charName ? ' active' : '');
      btn.dataset.chName = charName;
      btn.title          = charName;

      const img     = document.createElement('img');
      img.src       = `https://cdn.jsdelivr.net/gh/uko05/99_SharedImage@main/01_Genshin/chara_full/${data.icon}`;
      img.alt       = charName;
      img.draggable = false;
      img.onerror   = () => { img.style.opacity = '0.3'; };

      const label       = document.createElement('span');
      label.textContent = charName;

      btn.appendChild(img);
      btn.appendChild(label);
      return btn;
    }

    function initCharScroll(scrollEl, charNames) {
      scrollEl.innerHTML = '';
      const n = charNames.length;
      for (let c = 0; c < COPIES; c++) {
        scrollEl.appendChild(makeScrollDivider());
        for (const charName of charNames) {
          const btn = makeCharScrollBtn(charName);
          btn.addEventListener('click', () => {
            selectedCharaMode = charName;
            // 全スクロールのアクティブ状態を更新
            document.querySelectorAll('.artifact-scroll-wrap[id^="cscroll-"] .artifact-btn').forEach(b => {
              b.classList.toggle('active', b.dataset.chName === charName);
            });
            renderCharaMain();
          });
          scrollEl.appendChild(btn);
        }
      }

      // インジケーター生成
      const outer = scrollEl.parentElement;
      outer.querySelector('.scroll-indicator')?.remove();
      const indicator = document.createElement('div');
      indicator.className = 'scroll-indicator';
      indicator.textContent = `1 / ${n}`;
      outer.appendChild(indicator);

      let singleWidth = 0;
      let charRafPending = false;
      requestAnimationFrame(() => {
        singleWidth = scrollEl.scrollWidth / COPIES;
        scrollEl.scrollLeft = singleWidth;
      });

      scrollEl.addEventListener('scroll', () => {
        if (!singleWidth) return;
        if (scrollEl.scrollLeft < singleWidth * 0.3)       scrollEl.scrollLeft += singleWidth;
        else if (scrollEl.scrollLeft > singleWidth * 1.7)  scrollEl.scrollLeft -= singleWidth;
        // 案C：インジケーター更新
        if (!charRafPending) {
          charRafPending = true;
          requestAnimationFrame(() => {
            charRafPending = false;
            const cx = scrollEl.getBoundingClientRect().left + scrollEl.clientWidth / 2;
            const btns = scrollEl.querySelectorAll('.artifact-btn');
            let best = 0, minDist = Infinity;
            for (let i = 0; i < btns.length; i++) {
              const r = btns[i].getBoundingClientRect();
              const dist = Math.abs(r.left + r.width / 2 - cx);
              if (dist < minDist) { minDist = dist; best = i % n; }
            }
            indicator.textContent = `${best + 1} / ${n}`;
          });
        }
      }, { passive: true });

      scrollEl.addEventListener('wheel', (e) => {
        e.preventDefault();
        let delta = e.deltaY !== 0 ? e.deltaY : e.deltaX;
        if (e.deltaMode === 1) delta *= 40;
        if (e.deltaMode === 2) delta *= scrollEl.clientWidth;
        scrollEl.scrollLeft += delta;
      }, { passive: false });

      let isDragging = false, dragStartX = 0, dragScrollLeft = 0;
      scrollEl.addEventListener('mousedown', (e) => {
        e.preventDefault();
        isDragging = true; dragStartX = e.clientX; dragScrollLeft = scrollEl.scrollLeft;
        scrollEl.style.userSelect = 'none';
      });
      document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        scrollEl.scrollLeft = dragScrollLeft - (e.clientX - dragStartX);
      });
      document.addEventListener('mouseup', () => {
        isDragging = false; scrollEl.style.userSelect = '';
      });
    }

    function initAllCharScrolls() {
      CHAR_TABS.forEach(({ id, chars }) => {
        const el = document.getElementById(id);
        if (el) initCharScroll(el, chars);
      });
    }

    // ========== キャラ詳細（キャラタブ・メインエリア） ==========
    function renderCharaMain() {
      const main = document.getElementById('main-content');

      if (!selectedCharaMode) {
        main.innerHTML = '<p class="no-result">キャラアイコンをクリックすると詳細が表示されます</p>';
        return;
      }

      const charName = selectedCharaMode;
      const data     = characterBuild[charName];
      const rank1Set = data.recommendedSets.find(s => s.rank === 1);
      const rank2Set = data.recommendedSets.find(s => s.rank === 2);

      const CDN = 'https://cdn.jsdelivr.net/gh/uko05/99_SharedImage@main/01_Genshin/artifact/';

      function setLabelChara(recSet) {
        return recSet.sets.map(s => {
          const master = artifactSets.find(m => m.id === s.id);
          if (master) {
            return `<span class="chara-set-entry" data-set-id="${s.id}" data-count="${s.count}">` +
              `<span class="chara-set-name">${master.name}(${s.count}セット)</span>` +
              `<span class="chara-set-icons"><span class="chara-set-icon-wrap"><img class="chara-set-icon" src="${CDN}${s.id}.png" alt="${master.name}" onerror="this.style.opacity='0.3'"><span class="chara-set-icon-badge">詳細へ</span></span></span>` +
              `</span>`;
          }
          const group = effect2Groups.find(g => g.id === s.id);
          if (group) {
            const imgs = group.setIds.map(sid =>
              `<span class="chara-set-icon-wrap"><img class="chara-set-icon" data-set-id="${sid}" data-count="2" src="${CDN}${sid}.png" alt="${sid}" onerror="this.style.opacity='0.3'"><span class="chara-set-icon-badge">詳細へ</span></span>`
            ).join('');
            return `<span class="group-link chara-set-entry" data-group-id="${s.id}" data-count="${s.count}">` +
              `<span class="chara-set-name">${group.name}(${s.count}セット)</span>` +
              `<span class="chara-set-icons">${imgs}</span>` +
              `</span>`;
          }
          return `<span>${s.id}(${s.count}セット)</span>`;
        }).join('<br>');
      }

      const rank2Row = rank2Set
        ? `<div class="chara-detail-row"><span class="card-lbl">妥協：</span><span class="card-val">${setLabelChara(rank2Set)}</span></div>`
        : `<div class="chara-detail-row"><span class="card-lbl">妥協：</span><span class="card-val card-val-muted">使用率10％未満のため記載なし</span></div>`;

      const subStatText = data.subStats.map(s => getDisplayStat(s)).join('・');

      // キャラ変更時はフッターをリセット
      document.querySelector('#detail-card .card-inner').innerHTML =
        '<div class="card-placeholder">聖遺物名または画像をクリックすると効果が表示されます</div>';

      main.innerHTML = `
        <div class="chara-detail-card">
          <div class="chara-detail-top">
            <img class="chara-detail-img" src="https://cdn.jsdelivr.net/gh/uko05/99_SharedImage@main/01_Genshin/chara_full/${data.icon}" alt="${charName}" onerror="this.style.opacity='0.3'">
            <div class="chara-detail-charname">${charName}</div>
          </div>
          <div class="chara-detail-body">
            <div class="chara-detail-row"><span class="card-lbl">最適：</span><span class="card-val">${setLabelChara(rank1Set)}</span></div>
            ${rank2Row}
            <div class="chara-detail-row"><span class="card-lbl">時計：</span><span class="card-val">${getDisplayStat(data.mainStats.sands)}</span></div>
            <div class="chara-detail-row"><span class="card-lbl">杯：</span><span class="card-val">${getDisplayStat(data.mainStats.goblet)}</span></div>
            <div class="chara-detail-row"><span class="card-lbl">冠：</span><span class="card-val">${getDisplayStat(data.mainStats.circlet)}</span></div>
            <div class="chara-detail-sublbl">推奨サブステ：</div>
            <div class="chara-detail-subval">${subStatText}</div>
          </div>
        </div>
      `;
      attachGroupLinkHandlers(main);
      attachCharaSetHandlers(main);
    }

    // ========== 初期描画 ==========
    renderArtifactScroll();
    renderArtifactDetail();
    renderMain();
    renderCard();
    updateTabTop();
  </script>

  <!-- 共通サイドバー -->
  <!-- ローカル確認用: -->
  <script src="https://uko05.github.io/TopPage00/shared/sidebar.js"></script>
</body>
</html>
